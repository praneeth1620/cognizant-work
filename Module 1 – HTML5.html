<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Community Event Portal</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
}

#welcomeBanner{
    background:blue;
    color:white;
    padding:20px;
    text-align:center;
}

.highlight{
    background:yellow;
}

.gallery img{
    width:200px;
    height:150px;
    border:3px solid black;
}

table{
    border-collapse:collapse;
}

td{
    padding:10px;
}
</style>
</head>
<body>

<!-- Navigation -->
<nav>
<a href="#home">Home</a> |
<a href="#events">Events</a> |
<a href="#contact">Contact</a>
</nav>

<div id="welcomeBanner">
    Welcome User
    <span style="color:red;font-weight:bold">
        Special Offer
    </span>
</div>

<section id="events">
<h2 class="highlight">Community Events</h2>

<table class="gallery">
<tr>
<td><img src="img1.jpg" alt="event1"></td>
<td><img src="img2.jpg" alt="event2"></td>
<td><img src="img3.jpg" alt="event3"></td>
</tr>
<tr>
<td><img src="img4.jpg" alt="event4"></td>
<td><img src="img5.jpg" alt="event5"></td>
<td><img src="img6.jpg" alt="event6"></td>
</tr>
</table>
</section>

<h2>Registration Form</h2>

<form onsubmit="return confirmRegistration()">

<input type="text"
placeholder="Name"
required
autofocus>

<input type="email"
placeholder="Email"
required>

<input type="date"
required>

<select id="eventType"
onchange="showFee()">

<option>Workshop</option>
<option>Seminar</option>
<option>Conference</option>

</select>

<p id="fee"></p>

<textarea
id="feedback"
onkeyup="countChars()"></textarea>

<p id="count">0</p>

<button type="submit">Register</button>

</form>

<output id="msg"></output>

<h2>Video</h2>

<video width="400"
controls
oncanplay="videoReady()">
<source src="sample.mp4">
</video>

<p id="videoMsg"></p>

<button onclick="savePreference()">
Save Preference
</button>

<button onclick="clearStorage()">
Clear Preference
</button>

<button onclick="findLocation()">
Find Nearby Events
</button>

<p id="location"></p>

<script>

function confirmRegistration(){
document.getElementById("msg").innerHTML=
"Registration Successful";
return false;
}

function showFee(){
let event=document.getElementById("eventType").value;

if(event==="Workshop")
document.getElementById("fee").innerHTML="Fee ₹500";
else if(event==="Seminar")
document.getElementById("fee").innerHTML="Fee ₹1000";
else
document.getElementById("fee").innerHTML="Fee ₹1500";
}

function countChars(){
let len=
document.getElementById("feedback").value.length;

document.getElementById("count").innerHTML=len;
}

function videoReady(){
document.getElementById("videoMsg").innerHTML=
"Video Ready To Play";
}

function savePreference(){
localStorage.setItem(
"event",
document.getElementById("eventType").value
);
}

function clearStorage(){
localStorage.clear();
sessionStorage.clear();
}

function findLocation(){

navigator.geolocation.getCurrentPosition(
(position)=>{
document.getElementById("location").innerHTML=
position.coords.latitude+
","+
position.coords.longitude;
},
(error)=>{
alert(error.message);
},
{
enableHighAccuracy:true
}
);

}

window.onbeforeunload=function(){
return "Form not completed";
};

</script>

</body>
</html>
