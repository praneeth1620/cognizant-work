<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<title>Bootstrap 5 Demo</title>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand" href="#">Community Portal</a>

<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#">Events</a></li>
<li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
</ul>
</div>
</div>
</nav>

<!-- Typography -->
<div class="container mt-4">
<h1 class="display-1">Community Events</h1>
<p class="lead">Bootstrap Typography Example</p>
<p class="fw-bold">Bold Text</p>
<p class="text-muted">Muted Text</p>
</div>

<!-- Grid -->
<div class="container">
<div class="row">
<div class="col-md-3 bg-warning p-3">Sidebar</div>
<div class="col-md-9 bg-light p-3">Content Area</div>
</div>
</div>

<!-- Four Columns -->
<div class="container mt-4">
<div class="row">
<div class="col-sm-3 bg-danger text-white">1</div>
<div class="col-sm-3 bg-success text-white">2</div>
<div class="col-sm-3 bg-info text-white">3</div>
<div class="col-sm-3 bg-secondary text-white">4</div>
</div>
</div>

<!-- Card -->
<div class="container mt-4">
<div class="card shadow-lg">
<img src="https://via.placeholder.com/300"
class="card-img-top">
<div class="card-body">
<h5 class="card-title">Profile Card</h5>
<p class="card-text">Bootstrap Card Example</p>
<button class="btn btn-primary">View</button>
</div>
</div>
</div>

<!-- Form -->
<div class="container mt-4">
<form>
<div class="form-floating mb-3">
<input type="email"
class="form-control"
placeholder="Email">
<label>Email</label>
</div>

<div class="mb-3">
<input type="password"
class="form-control"
placeholder="Password">
</div>

<button class="btn btn-success">
Login
</button>
</form>
</div>

<!-- Buttons -->
<div class="container mt-4">
<button class="btn btn-primary">Primary</button>
<button class="btn btn-secondary">Secondary</button>
<button class="btn btn-outline-danger">Danger</button>
</div>

<!-- Accordion -->
<div class="container mt-4">
<div class="accordion">

<div class="accordion-item">
<h2 class="accordion-header">
<button class="accordion-button"
data-bs-toggle="collapse"
data-bs-target="#a1">
Event Details
</button>
</h2>

<div id="a1"
class="accordion-collapse collapse show">
<div class="accordion-body">
Bootstrap Accordion Example
</div>
</div>
</div>

</div>
</div>

<!-- Modal -->
<div class="container mt-4">
<button class="btn btn-info"
data-bs-toggle="modal"
data-bs-target="#myModal">
Open Modal
</button>
</div>

<div class="modal fade" id="myModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Modal Title</h5>
<button class="btn-close"
data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
Hello Bootstrap Modal
</div>

</div>
</div>
</div>

<!-- Icons -->
<footer class="bg-dark text-white text-center p-4 mt-4">
<i class="bi bi-facebook fs-3"></i>
<i class="bi bi-instagram fs-3"></i>
<i class="bi bi-twitter-x fs-3"></i>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
